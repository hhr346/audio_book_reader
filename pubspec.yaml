name: audio_book_reader
description: "有声图书阅读器 - 支持 epub 格式和 TTS 听书功能"
homepage: "https://github.com/hhr346/audio_book_reader"
publish_to: 'none'
version: 1.0.0+1

platforms:
  ios:
  android:
  macos:

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  
  # epub 解析
  epub_plus: ^5.1.0
  image: ^4.1.7  # 图像处理（封面提取）
  
  # 文本转语音
  flutter_tts: ^4.0.2  # 系统 TTS
  # kokoro_tts_flutter: ^0.2.0+1  # Kokoro AI TTS（暂时禁用，需要时启用）
  
  # 文件选择
  file_picker: ^6.1.1
  
  # 文件管理
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: "AppIcon"
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/fonts/
    - assets/icon/
