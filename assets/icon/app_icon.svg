<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆角背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bgGradient)"/>
  
  <!-- 打开的书本 -->
  <g transform="translate(512, 512)">
    <!-- 左页 -->
    <path d="M -200,-150 L -200,200 L 0,180 L 0,-180 Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- 右页 -->
    <path d="M 0,-180 L 0,180 L 200,200 L 200,-150 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- 书脊 -->
    <line x1="0" y1="-180" x2="0" y2="180" stroke="#E3F2FD" stroke-width="3"/>
    
    <!-- 声波 (从书中传出) -->
    <g stroke="#2196F3" stroke-width="8" fill="none" opacity="0.8">
      <!-- 内圈声波 -->
      <path d="M 80,-100 Q 120,-60 120,0 Q 120,60 80,100" transform="rotate(-30)"/>
      <!-- 中圈声波 -->
      <path d="M 110,-120 Q 160,-70 160,0 Q 160,70 110,120" transform="rotate(-30)"/>
      <!-- 外圈声波 -->
      <path d="M 140,-140 Q 200,-80 200,0 Q 200,80 140,140" transform="rotate(-30)"/>
    </g>
    
    <!-- 文字线条 (模拟书页内容) -->
    <g stroke="#90CAF9" stroke-width="3" opacity="0.6">
      <line x1="-170" y1="-100" x2="-30" y2="-100"/>
      <line x1="-170" y1="-60" x2="-30" y2="-60"/>
      <line x1="-170" y1="-20" x2="-30" y2="-20"/>
      <line x1="-170" y1="20" x2="-30" y2="20"/>
      <line x1="-170" y1="60" x2="-30" y2="60"/>
      
      <line x1="30" y1="-100" x2="170" y2="-100"/>
      <line x1="30" y1="-60" x2="170" y2="-60"/>
      <line x1="30" y1="-20" x2="170" y2="-20"/>
      <line x1="30" y1="20" x2="170" y2="20"/>
      <line x1="30" y1="60" x2="170" y2="60"/>
    </g>
  </g>
  
  <!-- 装饰性高光 -->
  <ellipse cx="300" cy="300" rx="100" ry="100" fill="#FFFFFF" opacity="0.1"/>
</svg>
